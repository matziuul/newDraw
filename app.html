<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MacDraw II Clone</title>
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Geneva, Chicago, Arial, sans-serif;
            background: #c0c0c0;
            overflow: hidden;
        }

        #app {
            display: grid;
            grid-template-columns: 84px 1fr 150px;
            grid-template-rows: 42px auto 1fr 28px;
            height: 100vh;
        }

        .menu-bar {
            grid-column: 1 / -1;
            grid-row: 1;
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 0 12px;
            background: white;
            border-bottom: 2px solid black;
            font-size: 14px;
            user-select: none;
        }

        .menu-title { font-weight: bold; }

        /* ── Dropdown menu system ── */
        .menu-wrap { position: relative; }

        .menu-head {
            padding: 2px 8px;
            cursor: default;
        }
        .menu-head:hover, .menu-head.open {
            background: black;
            color: white;
        }
        .menu-head-dimmed {
            padding: 2px 8px;
            color: #aaa;
            cursor: default;
        }

        .menu-drop {
            display: none;
            position: absolute;
            top: calc(100% + 2px);
            left: 0;
            background: white;
            border: 1px solid black;
            box-shadow: 2px 2px 0 rgba(0,0,0,0.35);
            min-width: 210px;
            z-index: 1000;
            padding: 3px 0;
        }
        .menu-drop.open { display: block; }

        .menu-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2px 14px 2px 18px;
            cursor: default;
            font-size: 13px;
            white-space: nowrap;
            gap: 20px;
        }
        .menu-row:hover:not(.disabled) { background: black; color: white; }
        .menu-row.disabled { color: #aaa; }

        .menu-kbd {
            font-family: inherit;
            font-size: 12px;
            opacity: 0.65;
        }
        .menu-row:hover:not(.disabled) .menu-kbd { opacity: 0.9; }

        .menu-sep {
            border: none;
            border-top: 1px solid #ddd;
            margin: 3px 0;
        }

        .toolbox {
            background: #e5e5e5;
            border-right: 2px solid black;
            padding: 4px 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            overflow-y: auto;
        }

        /* ── Pattern bar (right of toolbox top, spans editor+inspector columns) ── */
        .pattern-bar {
            grid-column: 2 / -1;
            grid-row: 2;
            background: #e5e5e5;
            border-bottom: 2px solid black;
            border-left: 2px solid black;
            padding: 3px 10px;
            display: flex;
            align-items: center;
            gap: 14px;
            overflow-x: auto;
        }

        .pattern-bar .pattern-pair {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .pattern-bar .pattern-pair-col {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* 2 fixed rows, columns auto-added as swatches are appended */
        .pattern-bar .pattern-grid {
            display: grid;
            grid-template-rows: 18px 18px;
            grid-auto-flow: column;
            grid-auto-columns: 18px;
            gap: 2px;
        }

        .pattern-bar-sep {
            width: 1px;
            height: 36px;
            background: #aaa;
            flex-shrink: 0;
        }

        .toolbox     { grid-column: 1; grid-row: 2 / 4; }
        .editor-area { grid-column: 2; grid-row: 3; }
        .inspector   { grid-column: 3; grid-row: 3; }
        .status-bar  { grid-row: 4; }

        .tool-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3px;
            width: 100%;
        }

        .tool-button {
            width: 36px;
            height: 36px;
            border: 2px solid black;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            padding: 0;
        }

        .tool-button.active { background: black; color: white; }
        .tool-button.sticky { outline: 2px solid #0055ff; outline-offset: 1px; }

        .tool-divider {
            width: 100%;
            border: none;
            border-top: 2px solid black;
            margin: 2px 0;
        }

        .pattern-pair {
            display: flex;
            gap: 4px;
            align-items: flex-start;
        }
        .pattern-pair-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .pattern-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2px;
        }

        .pattern-swatch {
            width: 18px;
            height: 18px;
            cursor: pointer;
            display: block;
            image-rendering: pixelated;
        }

        .pattern-swatch.active { outline: 2px solid #0055ff; outline-offset: 1px; }

        .stroke-pattern-swatch {
            width: 18px;
            height: 18px;
            cursor: pointer;
            display: block;
            image-rendering: pixelated;
        }
        .stroke-pattern-swatch.active { outline: 2px solid #0055ff; outline-offset: 1px; }

        .toolbar-label {
            font-size: 9px;
            font-family: Geneva, sans-serif;
            color: #444;
            user-select: none;
        }

        .stroke-swatch {
            width: 36px; height: 14px;
            border: 1px solid black;
            background: white;
            cursor: pointer;
            display: block;
            image-rendering: pixelated;
        }
        .stroke-swatch.active { outline: 2px solid #0055ff; outline-offset: 1px; }
        #strokeGrid { display: flex; flex-direction: column; gap: 3px; }

        .dash-swatch {
            width: 36px; height: 14px;
            border: 1px solid black;
            background: white;
            cursor: pointer;
            display: block;
            image-rendering: pixelated;
        }
        .dash-swatch.active { outline: 2px solid #0055ff; outline-offset: 1px; }
        #dashGrid { display: flex; flex-direction: column; gap: 3px; }

        .arrow-swatch {
            width: 36px; height: 14px;
            border: 1px solid black;
            background: white;
            cursor: pointer;
            display: block;
            image-rendering: pixelated;
        }
        .arrow-swatch.active { outline: 2px solid #0055ff; outline-offset: 1px; }
        #arrowGrid { display: flex; flex-direction: column; gap: 3px; }

        .corner-swatch {
            width: 32px; height: 20px;
            border: 1px solid black;
            background: white;
            cursor: pointer;
            display: block;
            image-rendering: pixelated;
        }
        .corner-swatch.active { outline: 2px solid #0055ff; outline-offset: 1px; }
        #cornerGrid { display: flex; flex-direction: column; gap: 3px; }


        /* ── Inspector panel ── */
        .inspector {
            background: #e5e5e5;
            border-left: 2px solid black;
            padding: 6px 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow-y: auto;
            font-size: 11px;
            font-family: Geneva, Chicago, Arial, sans-serif;
        }
        .insp-title {
            font-weight: bold;
            font-size: 11px;
            border-bottom: 1px solid #999;
            padding-bottom: 4px;
            user-select: none;
        }
        .insp-row {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .insp-label {
            width: 14px;
            flex-shrink: 0;
            color: #333;
            user-select: none;
        }
        .insp-input {
            width: 100%;
            font: 11px Geneva, Chicago, Arial, sans-serif;
            border: 1px solid #888;
            background: white;
            padding: 1px 3px;
            height: 18px;
            box-sizing: border-box;
            text-align: right;
            -moz-appearance: textfield;
        }
        .insp-input:disabled {
            background: #d4d4d4;
            color: #888;
            border-color: #aaa;
        }
        .insp-input::-webkit-inner-spin-button,
        .insp-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .insp-unit {
            text-align: right;
            color: #555;
            font-size: 10px;
            padding-top: 2px;
        }

        /* ── Text input overlay ── */
        #textInput {
            position: absolute;
            display: none;
            outline: 1px dashed #0055ff;
            background: transparent;
            color: black;
            min-width: 20px;
            min-height: 1em;
            padding: 0;
            margin: 0;
            white-space: pre-wrap;
            word-break: break-all;
            overflow: visible;
            z-index: 10;
            cursor: text;
        }

        /* ── Submenus ── */
        .menu-row { position: relative; }
        .menu-check { position: absolute; left: 4px; visibility: hidden; }
        .menu-row.checked .menu-check { visibility: visible; }
        .menu-has-sub > span.menu-arr { font-size: 9px; margin-left: auto; padding-left: 12px; }
        .menu-sub {
            display: none;
            position: absolute;
            left: calc(100% + 1px);
            top: -4px;
            background: white;
            border: 1px solid black;
            box-shadow: 2px 2px 0 rgba(0,0,0,0.35);
            min-width: 160px;
            z-index: 1001;
            padding: 3px 0;
        }
        .menu-has-sub:hover > .menu-sub { display: block; }
        .menu-has-sub:hover { background: black; color: white; }
        .menu-sub { color: black; }

        /* ── Editor layout ── */
        .editor-area {
            overflow: auto;
            background: #808080;
            padding: 0;
        }

        .zoom-stage {
            position: relative;
        }

        /* Grid wrapper: corner | h-ruler / v-ruler | document */
        .doc-wrap {
            display: grid;
            grid-template-columns: 20px 1200px;
            grid-template-rows: 20px 900px;
            width: 1220px;
            transform-origin: 0 0;
        }

        /* ── Zoom buttons (in status bar) ── */
        .zoom-btn {
            height: 22px;
            width: 30px;
            border: 1px solid #888;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2px 3px;
            flex-shrink: 0;
        }
        .zoom-btn:hover { background: #e8e8e8; }
        .zoom-btn:active { background: black; filter: invert(1); }
        #zoomBtns {
            display: flex;
            gap: 2px;
            align-items: center;
            margin-right: 8px;
        }

        .ruler-corner {
            background: #c8c8c8;
            border-right: 1px solid #888;
            border-bottom: 1px solid #888;
        }

        #rulerH {
            display: block;
            width: 1200px;
            height: 20px;
            border-bottom: 1px solid #888;
            image-rendering: pixelated;
        }

        #rulerV {
            display: block;
            width: 20px;
            height: 900px;
            border-right: 1px solid #888;
            image-rendering: pixelated;
        }

        .document {
            position: relative;
            width: 1200px;
            height: 900px;
            background: white;
            box-shadow: 2px 2px 0 2px black;
        }

        #drawingCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* ── Status bar ── */
        .status-bar {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            padding: 0 10px;
            background: white;
            border-top: 2px solid black;
            font-size: 12px;
            gap: 20px;
        }

        .status-bar .hint { margin-left: auto; color: #888; font-size: 11px; }

        .grid-controls { display: flex; align-items: center; gap: 8px; }
        .grid-controls label { display: flex; align-items: center; gap: 3px; cursor: pointer; }
        .grid-controls select { font: inherit; font-size: 11px; border: 1px solid #888; background: white; padding: 0 2px; height: 18px; cursor: pointer; }
        .grid-controls .sep { color: #bbb; }

        /* ── Debug log panel ── */
        #debugPanel {
            position: fixed;
            top: 42px;
            right: 0;
            bottom: 28px;
            width: 480px;
            background: #1a1a1a;
            color: #ccc;
            border-left: 2px solid black;
            display: none;
            flex-direction: column;
            z-index: 900;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
        }
        .dbg-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 8px;
            background: #2d2d2d;
            border-bottom: 1px solid #444;
            flex-shrink: 0;
            color: #aaa;
            font-family: Geneva, Chicago, Arial, sans-serif;
            font-size: 11px;
            user-select: none;
        }
        .dbg-header button {
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 14px;
            padding: 0 4px;
            line-height: 1;
        }
        .dbg-header button:hover { color: white; }
        .dbg-list { overflow-y: auto; flex: 1; }
        .dbg-row {
            padding: 1px 8px;
            cursor: pointer;
            white-space: pre;
            line-height: 1.55;
            border-bottom: 1px solid #242424;
        }
        .dbg-row:hover { background: #2d2d2d; }
        .dbg-row.dbg-active { background: #0d3a6e; color: #fff; }
        .dbg-hint {
            padding: 3px 8px;
            color: #555;
            font-family: Geneva, Chicago, Arial, sans-serif;
            font-size: 10px;
            flex-shrink: 0;
            border-top: 1px solid #333;
        }

        /* ── Canvas Size dialog ── */
        dialog#canvasSizeDialog {
            border: 2px solid black;
            padding: 0;
            font-family: Geneva, Chicago, Arial, sans-serif;
            font-size: 13px;
            box-shadow: 3px 3px 0 rgba(0,0,0,0.4);
            min-width: 310px;
        }
        dialog#canvasSizeDialog::backdrop { background: rgba(0,0,0,0.25); }
        #canvasSizeDialog .dlg-title {
            background: black; color: white;
            padding: 5px 12px; font-weight: bold; font-size: 13px; user-select: none;
        }
        #canvasSizeDialog .dlg-body {
            padding: 12px 16px; display: flex; flex-direction: column; gap: 9px;
        }
        #canvasSizeDialog .dlg-row { display: flex; align-items: center; gap: 8px; }
        #canvasSizeDialog .dlg-label { width: 110px; flex-shrink: 0; color: #333; }
        #canvasSizeDialog select,
        #canvasSizeDialog input[type="number"] {
            font: 12px Geneva, Chicago, Arial, sans-serif;
            border: 1px solid #888; background: white; height: 20px; padding: 0 4px;
        }
        #canvasSizeDialog input[type="number"] {
            width: 72px; text-align: right; -moz-appearance: textfield;
        }
        #canvasSizeDialog input[type="number"]::-webkit-inner-spin-button,
        #canvasSizeDialog input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
        #canvasSizeDialog .dlg-mm { font-size: 11px; color: #666; min-width: 52px; }
        #canvasSizeDialog .dlg-footer {
            display: flex; justify-content: flex-end; gap: 8px;
            padding: 8px 16px 12px; border-top: 1px solid #ddd;
        }
        #canvasSizeDialog button {
            font: 12px Geneva, Chicago, Arial, sans-serif;
            padding: 3px 16px; border: 2px solid black; background: white; cursor: pointer;
        }
        #canvasSizeDialog button.primary { background: black; color: white; }

        /* ── Color Picker palette ── */
        .mac-palette {
            position: fixed;
            top: 100px;
            right: 164px;
            z-index: 900;
            background: white;
            border: 1px solid black;
            box-shadow: 2px 2px 0 rgba(0,0,0,0.35);
            font-family: Geneva, Chicago, Arial, sans-serif;
            font-size: 11px;
            user-select: none;
        }
        .mac-palette-title {
            background: repeating-linear-gradient(to bottom, #888 0, #888 1px, #e0e0e0 1px, #e0e0e0 2px);
            padding: 3px 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            min-height: 22px;
        }
        .mac-palette-label {
            background: #e0e0e0;
            padding: 0 6px;
            font-size: 11px;
            font-weight: bold;
        }
        .mac-palette-close {
            position: absolute;
            right: 4px;
            top: 50%;
            transform: translateY(-50%);
            background: #e0e0e0;
            border: 1px solid #888;
            cursor: pointer;
            font-size: 9px;
            padding: 0 3px;
            line-height: 1.5;
            color: #333;
        }
        .mac-palette-close:hover { background: #ccc; }
        .mac-palette-body { padding: 8px; }
        .cp-tabs { display: flex; gap: 4px; margin-bottom: 8px; }
        .cp-tab {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            border: 2px solid transparent;
            padding: 3px;
            border-radius: 2px;
            font-size: 10px;
        }
        .cp-tab-active { border-color: #000; }
        .cp-swatch { width: 28px; height: 28px; border: 1px solid #888; margin-bottom: 3px; }
        #_cpCanvas { display: block; cursor: crosshair; }
        .cp-bottom { display: flex; align-items: center; gap: 5px; margin-top: 7px; }
        .cp-none-btn {
            font: 11px Geneva, Chicago, Arial, sans-serif;
            padding: 2px 7px;
            border: 1px solid #888;
            background: white;
            cursor: pointer;
        }
        .cp-none-btn:hover { background: #eee; }
        .cp-hex {
            width: 62px;
            font: 11px monospace;
            border: 1px solid #888;
            padding: 1px 3px;
            height: 20px;
        }
        .cp-preview { flex: 1; height: 20px; border: 1px solid #888; }
    </style>
</head>
<body>
<div id="app">
    <div class="menu-bar">
        <div class="menu-title">&#8984;</div>
        <!-- menus injected by MenuSystem -->
    </div>

    <div class="pattern-bar">
        <div class="pattern-pair">
            <div class="pattern-pair-col">
                <div class="pattern-grid" id="patternGrid"></div>
            </div>
            <div class="pattern-bar-sep"></div>
            <div class="pattern-pair-col">
                <div class="pattern-grid" id="strokePatternGrid"></div>
            </div>
        </div>
    </div>

    <aside class="toolbox">
        <div class="tool-grid">
            <button class="tool-button active" data-tool="select"    title="Markera (S)">⌖</button>
            <button class="tool-button"        data-tool="rectangle" title="Rektangel (R)">▭</button>
            <button class="tool-button"        data-tool="roundrect" title="Rundrektangel (O)"><svg width="22" height="16" viewBox="0 0 28 20" fill="none" stroke="currentColor"><rect x="2" y="2" width="24" height="16" rx="4" ry="4" stroke-width="1.8"/></svg></button>
            <button class="tool-button"        data-tool="ellipse"   title="Ellips (E)">◯</button>
            <button class="tool-button"        data-tool="line"      title="Linje (L)">／</button>
            <button class="tool-button"        data-tool="bezier"    title="Bézier (B)"><svg width="22" height="22" viewBox="0 0 26 26" fill="none" stroke="currentColor"><path d="M4 22 C4 8 22 18 22 4" stroke-width="1.8" stroke-linecap="round"/><circle cx="4" cy="22" r="2.2" fill="currentColor" stroke="none"/><circle cx="22" cy="4" r="2.2" fill="currentColor" stroke="none"/><line x1="4" y1="22" x2="4" y2="8" stroke-width="1" opacity="0.65"/><circle cx="4" cy="8" r="1.8" fill="none" stroke-width="1" opacity="0.65"/><line x1="22" y1="4" x2="22" y2="18" stroke-width="1" opacity="0.65"/><circle cx="22" cy="18" r="1.8" fill="none" stroke-width="1" opacity="0.65"/></svg></button>
            <button class="tool-button"        data-tool="arc"       title="Båge (A)"><svg width="22" height="22" viewBox="0 0 26 26" fill="none" stroke="currentColor"><path d="M13 13 L13 2 A11 11 0 0 1 24 13 Z" stroke-width="1.7" stroke-linejoin="round"/></svg></button>
            <button class="tool-button"        data-tool="text"      title="Text (T)">A</button>
        </div>
        <hr class="tool-divider" />
        <div id="strokeGrid"></div>
        <hr class="tool-divider" />
        <div id="dashGrid"></div>
        <hr class="tool-divider" />
        <div id="arrowGrid"></div>
        <hr class="tool-divider" />
        <div id="cornerGrid"></div>
    </aside>

    <main class="editor-area">
        <div class="zoom-stage">
            <div class="doc-wrap">
                <div class="ruler-corner"></div>
                <canvas id="rulerH" width="1200" height="20"></canvas>
                <canvas id="rulerV" width="20"   height="900"></canvas>
                <div class="document">
                    <canvas id="drawingCanvas" width="1200" height="900"></canvas>
                    <div id="textInput" contenteditable="true" spellcheck="false"></div>
                </div>
            </div>
        </div>
    </main>

    <aside class="inspector">
        <div class="insp-title">Objekt</div>
        <div class="insp-row">
            <span class="insp-label">X</span>
            <input class="insp-input" id="inspX" type="number">
        </div>
        <div class="insp-row">
            <span class="insp-label">Y</span>
            <input class="insp-input" id="inspY" type="number">
        </div>
        <div class="insp-row">
            <span class="insp-label">B</span>
            <input class="insp-input" id="inspW" type="number" min="0">
        </div>
        <div class="insp-row">
            <span class="insp-label">H</span>
            <input class="insp-input" id="inspH" type="number" min="0">
        </div>
        <div class="insp-row" id="inspArcRow" style="display:none">
            <span class="insp-label">°</span>
            <input class="insp-input" id="inspArc" type="number" min="1" max="360" step="1">
        </div>
        <div class="insp-unit" id="inspUnit">px</div>
    </aside>

    <footer class="status-bar">
        <div id="zoomBtns">
            <button class="zoom-btn" id="zoomOut" title="Zoom Out">
                <svg width="22" height="16" viewBox="0 0 26 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <polygon points="1,18 9,11 17,18"  fill="white" stroke="black" stroke-width="1.5" stroke-linejoin="round"/>
                    <polygon points="10,18 19,7 26,18"  fill="white" stroke="black" stroke-width="1.5" stroke-linejoin="round"/>
                    <line x1="0" y1="18" x2="26" y2="18" stroke="black" stroke-width="1.5"/>
                </svg>
            </button>
            <button class="zoom-btn" id="zoomIn" title="Zoom In">
                <svg width="22" height="16" viewBox="0 0 26 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <polygon points="0,19 8,7 16,19"  fill="white" stroke="black" stroke-width="1.5" stroke-linejoin="round"/>
                    <polygon points="9,19 19,1 26,19"  fill="white" stroke="black" stroke-width="1.5" stroke-linejoin="round"/>
                    <line x1="0" y1="19" x2="26" y2="19" stroke="black" stroke-width="1.5"/>
                </svg>
            </button>
        </div>
        <span id="statusTool">Verktyg: Select</span>
        <span id="statusPos"></span>
        <span id="statusSize"></span>
        <span class="grid-controls">
            <label><input type="checkbox" id="cbGrid"> Grid</label>
            <label><input type="checkbox" id="cbSnap"> Snap</label>
            <select id="selGridSize" title="Grid size"></select>
            <span class="sep">|</span>
            <select id="selUnit" title="Ruler unit">
                <option value="px">px</option>
                <option value="mm">mm</option>
                <option value="in">in</option>
            </select>
        </span>
        <button id="dbgToggle" style="margin-left:auto;font:11px Geneva,sans-serif;border:1px solid #999;background:white;padding:1px 8px;cursor:pointer">Log</button>
    </footer>
</div>

<div id="debugPanel">
    <div class="dbg-header">
        <span>Import Log &nbsp;<kbd style="font-size:10px;background:#444;padding:1px 5px;border-radius:2px;color:#ccc">` </kbd></span>
        <button id="dbgClose" title="Close">✕</button>
    </div>
    <div class="dbg-list" id="dbgList"></div>
    <div class="dbg-hint">Click row → select shape &nbsp;·&nbsp; Select shape → highlights row</div>
</div>

<input type="file" id="importFile" accept=".pict,.pic,.drw,.bin" style="display:none">
<input type="file" id="docFile"    accept=".mcd"                   style="display:none">

<dialog id="canvasSizeDialog">
    <div class="dlg-title">Canvas Size</div>
    <div class="dlg-body">
        <div class="dlg-row">
            <span class="dlg-label">Preset</span>
            <select id="dlgPreset">
                <option value="">Custom</option>
                <option value="a4p">A4 Portrait (794×1123)</option>
                <option value="a4l">A4 Landscape (1123×794)</option>
                <option value="ltp">US Letter Portrait (816×1056)</option>
                <option value="ltl">US Letter Landscape (1056×816)</option>
            </select>
        </div>
        <div class="dlg-row">
            <span class="dlg-label">Width</span>
            <input id="dlgW" type="number" min="100" max="9999" value="1200">
            <span class="dlg-mm" id="dlgWmm"></span>
        </div>
        <div class="dlg-row">
            <span class="dlg-label">Height</span>
            <input id="dlgH" type="number" min="100" max="9999" value="900">
            <span class="dlg-mm" id="dlgHmm"></span>
        </div>
        <div class="dlg-row">
            <span class="dlg-label">Page markers</span>
            <select id="dlgMarkers">
                <option value="">None</option>
                <option value="a4p">A4 Portrait</option>
                <option value="a4l">A4 Landscape</option>
                <option value="ltp">US Letter Portrait</option>
                <option value="ltl">US Letter Landscape</option>
            </select>
        </div>
    </div>
    <div class="dlg-footer">
        <button id="dlgCancel">Cancel</button>
        <button id="dlgApply" class="primary">Apply</button>
    </div>
</dialog>

<script type="module" src="src/main.js"></script>
</body>
</html>
